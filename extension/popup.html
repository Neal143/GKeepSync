<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      font-family: 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      padding: 16px;
    }
    h1 {
      font-size: 16px;
      text-align: center;
      margin-bottom: 12px;
      color: #fff;
    }
    h1 span { font-size: 22px; }
    .status {
      background: #16213e;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
      font-size: 13px;
      text-align: center;
    }
    .status.success { border-left: 3px solid #2ecc71; }
    .status.error { border-left: 3px solid #e74c3c; }
    .status.waiting { border-left: 3px solid #f39c12; }
    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: #3498db;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #2980b9; }
    .help {
      margin-top: 12px;
      font-size: 11px;
      color: #888;
      text-align: center;
    }
  </style>
</head>
<body>
  <h1><span>🔄</span> GKeepSync</h1>

  <div id="status" class="status waiting">
    ⏳ Chưa đăng nhập. Bấm nút bên dưới để bắt đầu.
  </div>

  <button id="loginBtn">🌐 Đăng nhập Google</button>

  <p class="help">
    Sau khi đăng nhập, extension sẽ tự động gửi token về app GKeepSync.
  </p>

  <script src="popup.js"></script>
</body>
</html>
