<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 320px;
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
            padding: 16px;
        }

        h1 {
            font-size: 16px;
            text-align: center;
            margin-bottom: 16px;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        h1 span {
            font-size: 22px;
        }

        .status {
            background: #16213e;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 16px;
            font-size: 13px;
            text-align: center;
            line-height: 1.4;
            word-break: break-word;
        }

        .status.success {
            border-left: 3px solid #2ecc71;
        }

        .status.error {
            border-left: 3px solid #e74c3c;
        }

        .status.waiting {
            border-left: 3px solid #f39c12;
        }

        .form-group {
            margin-bottom: 12px;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            margin-bottom: 4px;
            color: #888;
        }

        input {
            width: 100%;
            padding: 8px 10px;
            border-radius: 6px;
            border: 1px solid #2a2a4a;
            background: #0f0f1a;
            color: #fff;
            font-size: 13px;
        }

        input:focus {
            outline: none;
            border-color: #3498db;
        }

        button {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .btn-primary {
            background: #3498db;
            color: #fff;
        }

        .btn-primary:hover {
            background: #2980b9;
        }

        .btn-primary:disabled {
            background: #2c3e50;
            color: #7f8c8d;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: #2a2a4a;
            color: #fff;
        }

        .btn-secondary:hover {
            background: #3a3a6a;
        }

        .help {
            margin-top: 16px;
            font-size: 11px;
            color: #888;
            text-align: center;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <h1><span>🔄</span> GKeepSync</h1>

    <div id="status" class="status waiting">
        ⏳ Nhấn nút xanh bên dưới để bắt đầu đăng nhập
    </div>

    <button id="loginBtn" class="btn-primary">🌐 1. Mở trang đăng nhập Google</button>

    <div class="form-group" style="margin-top: 16px;">
        <label>Email của bạn:</label>
        <input type="email" id="emailInput" placeholder="someone@gmail.com">
    </div>

    <div class="form-group">
        <label>Mã Token (Tự động điền sau khi login):</label>
        <input type="password" id="tokenInput" placeholder="oauth_token..." readonly>
    </div>

    <button id="sendBtn" class="btn-secondary" disabled>🚀 2. Gửi Token đến App GKeepSync</button>

    <p class="help">
        Lần đầu tiên: Ấn (1) để đăng nhập Google.<br>
        Extension sẽ tự lấy Token và gửi (2) về App.<br>
        Các lần sau không cần đăng nhập lại.
    </p>

    <script src="popup.js"></script>
</body>
</html>
